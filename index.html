<!doctype html>
<html lang="pt-PT">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Educação Inclusiva</title>
<style>
*{box-sizing:border-box}
html,body{
  font-family:'Cinzel','Trajan Pro',Georgia,'Times New Roman',serif;
  margin:0;
  color:#f8fafc;
  background:#070707 url('fundo.jpeg') center top/cover fixed no-repeat;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.34);
  z-index:-1;
}
.wrap{
  max-width:1180px;
  margin:0 auto;
  padding:210px 28px 34px;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.landing{width:100%;}
.card{
  width:100%;
  background:rgba(8,12,18,.64);
  border:1px solid rgba(212,175,55,.34);
  border-radius:22px;
  box-shadow:0 16px 50px rgba(0,0,0,.42);
  padding:34px 34px 40px;
  backdrop-filter:blur(4px);
}
.logo{
  position:absolute;
  top:22px;
  left:28px;
  transform:none;
  display:block;
  width:min(310px,56vw);
  height:auto;
  filter:drop-shadow(0 12px 24px rgba(0,0,0,.55));
  z-index:2;
}
h1{
  margin:0 0 26px;
  font-size:38px;
  line-height:1.2;
  text-align:center;
  color:#f8fafc;
  letter-spacing:1.1px;
  font-family:'Cinzel','Trajan Pro',Georgia,'Times New Roman',serif;
  font-weight:700;
  text-shadow:0 2px 10px rgba(0,0,0,.75);
}
.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:16px;
  margin-top:16px;
}
.testbtn{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:74px;
  text-align:center;
  background:rgba(0,0,0,.62);
  border:1px solid rgba(255,255,255,.36);
  border-radius:16px;
  padding:20px 14px;
  text-decoration:none;
  color:#ffffff;
  box-shadow:0 8px 22px rgba(0,0,0,.36), inset 0 1px 0 rgba(255,255,255,.13);
  transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  font-family:'Cinzel','Trajan Pro',Georgia,'Times New Roman',serif;
  letter-spacing:.5px;
}
.testbtn:hover{
  transform:translateY(-2px);
  background:rgba(0,0,0,.82);
  box-shadow:0 12px 26px rgba(0,0,0,.48), 0 0 0 2px rgba(255,255,255,.14);
}
.testbtn strong{
  font-size:20px;
  font-weight:700;
  color:#ffffff;
  text-align:center;
}
@media (max-width:980px){
  .grid{grid-template-columns:repeat(2,1fr)}
  .wrap{align-items:flex-start;padding-top:190px}
}
@media (max-width:560px){
  body{background-position:center top;background-size:auto 100vh;}
  .grid{grid-template-columns:1fr;gap:12px}
  h1{font-size:29px}
  .card{padding:24px 18px 28px}
  .logo{top:18px;left:16px;width:min(230px,58vw)}
  .wrap{padding:170px 16px 28px;align-items:flex-start}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="landing">
    <img class="logo" src="logotipo.png" alt="Os Pupilos do Lencastre">
  <div class="card">
    <h1>Educação Inclusiva</h1>
    <div class="grid">
      <a class="testbtn" href="teste_1.html"><strong>Teste 1</strong></a>
      <a class="testbtn" href="teste_2.html"><strong>Teste 2</strong></a>
      <a class="testbtn" href="teste_3.html"><strong>Teste 3</strong></a>
      <a class="testbtn" href="teste_4.html"><strong>Teste 4</strong></a>
      <a class="testbtn" href="teste_5.html"><strong>Teste 5</strong></a>
      <a class="testbtn" href="teste_6.html"><strong>Teste 6</strong></a>
      <a class="testbtn" href="teste_7.html"><strong>Teste 7</strong></a>
      <a class="testbtn" href="teste_8.html"><strong>Teste 8</strong></a>
      <a class="testbtn" href="teste_9.html"><strong>Teste 9</strong></a>
      <a class="testbtn" href="teste_10.html"><strong>Teste 10</strong></a>
    </div>
  </div>
  </div>
</div>
</body>
</html>
