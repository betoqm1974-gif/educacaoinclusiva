<!doctype html>
<html lang="pt-PT">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Educação Inclusiva</title>
<style>
*{box-sizing:border-box}
html,body{
  font-family:'Cinzel','Trajan Pro',Georgia,'Times New Roman',serif;
  margin:0;
  color:#f8fafc;
  background:#070707 url('fundo.jpeg') center top/cover fixed no-repeat;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.34);
  z-index:-1;
}
.wrap{
  max-width:1180px;
  margin:0 auto;
  padding:28px 22px 22px;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.landing{width:100%; transform:translateY(0);}
.main-title{
  margin:0 0 22px;
  font-size:44px;
  line-height:1.1;
  text-align:center;
  color:#f7ead0;
  letter-spacing:2.4px;
  font-family:'Cinzel','Trajan Pro',Georgia,'Times New Roman',serif;
  font-weight:800;
  text-transform:uppercase;
  text-shadow:0 3px 12px rgba(0,0,0,.85), 0 0 18px rgba(212,175,55,.35);
}
.card{
  width:100%;
  background:rgba(8,12,18,.64);
  border:1px solid rgba(212,175,55,.34);
  border-radius:22px;
  box-shadow:0 16px 50px rgba(0,0,0,.42);
  padding:24px 24px 28px;
  backdrop-filter:blur(4px);
}
.card h1{
  margin:0 0 18px;
  font-size:34px;
  line-height:1.2;
  text-align:center;
  color:#f8fafc;
  letter-spacing:1.1px;
  font-family:'Cinzel','Trajan Pro',Georgia,'Times New Roman',serif;
  font-weight:700;
  text-shadow:0 2px 10px rgba(0,0,0,.75);
}
.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:16px;
  margin-top:16px;
}
.testbtn{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:62px;
  text-align:center;
  background:rgba(0,0,0,.62);
  border:1px solid rgba(255,255,255,.36);
  border-radius:13px;
  padding:16px 12px;
  text-decoration:none;
  color:#ffffff;
  box-shadow:0 8px 22px rgba(0,0,0,.36), inset 0 1px 0 rgba(255,255,255,.13);
  transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  font-family:'Cinzel','Trajan Pro',Georgia,'Times New Roman',serif;
  letter-spacing:.5px;
}
.testbtn:hover{
  transform:translateY(-2px);
  background:rgba(80,20,20,.62);
  border-color:rgba(255,255,255,.65);
  box-shadow:0 12px 26px rgba(0,0,0,.48), 0 0 0 2px rgba(255,255,255,.14);
}
.finalbtn{grid-column:2 / span 3;background:rgba(80,20,20,.62);border-color:rgba(255,255,255,.65)}
.testbtn strong{
  font-size:18px;
  font-weight:700;
  color:#ffffff;
  text-align:center;
}

.credit{
  margin-top:12px;
  text-align:center;
  color:#ffffff;
  font-size:12px;
  letter-spacing:.7px;
  font-family:Arial,Helvetica,sans-serif;
  text-shadow:0 2px 8px rgba(0,0,0,.85);
  opacity:.92;
}

@media (max-width:980px){
  .grid{grid-template-columns:repeat(2,1fr)}
  .finalbtn{grid-column:1 / span 2}
  .wrap{align-items:center;padding-top:22px}
  .landing{transform:translateY(0)}
  .main-title{font-size:36px;margin-bottom:18px}
}

@media (max-width:560px){
  body{background-position:center 18%;background-size:auto 105vh;}
  .finalbtn{grid-column:1 / span 2}
  .grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .main-title{font-size:27px;letter-spacing:1.4px;margin-bottom:14px}
  .card{padding:16px 12px 18px;margin-top:0}
  .wrap{padding:14px 10px 14px;align-items:center}
  .landing{transform:translateY(0)}
  .testbtn{min-height:46px;padding:10px 9px;border-radius:10px}
  .testbtn strong{font-size:14px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="landing">
    <h1 class="main-title">Educação Inclusiva</h1>
  <div class="card">
    <div class="grid">
      <a class="testbtn" href="teste_1.html"><strong>Teste 1</strong></a>
      <a class="testbtn" href="teste_2.html"><strong>Teste 2</strong></a>
      <a class="testbtn" href="teste_3.html"><strong>Teste 3</strong></a>
      <a class="testbtn" href="teste_4.html"><strong>Teste 4</strong></a>
      <a class="testbtn" href="teste_5.html"><strong>Teste 5</strong></a>
      <a class="testbtn" href="teste_6.html"><strong>Teste 6</strong></a>
      <a class="testbtn" href="teste_7.html"><strong>Teste 7</strong></a>
      <a class="testbtn" href="teste_8.html"><strong>Teste 8</strong></a>
      <a class="testbtn" href="teste_9.html"><strong>Teste 9</strong></a>
      <a class="testbtn" href="teste_10.html"><strong>Teste 10</strong></a>
      <a class="testbtn finalbtn" href="teste_final.html"><strong>Teste Final</strong></a>
    </div>
  </div>
    <div class="credit">Manuel Morais | 2026</div>
  </div>
</div>
</body>
</html>
